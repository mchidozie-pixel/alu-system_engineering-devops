<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: #333;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: 8rem;
      margin: 0;
      color: #e74c3c;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    p {
      font-size: 1.5rem;
      margin: 10px 0;
    }

    .highlight {
      font-weight: bold;
      color: #e67e22;
      font-size: 1.7rem;
      margin-bottom: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #fff;
      background-color: #3498db;
      padding: 12px 28px;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      font-weight: bold;
    }

    a:hover {
      background-color: #2980b9;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    /* subtle floating squares in background */
    .square {
      position: absolute;
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.2);
      animation: float 6s infinite;
      border-radius: 12px;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-100px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    .square:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
    .square:nth-child(2) { top: 50%; left: 70%; animation-delay: 2s; }
    .square:nth-child(3) { top: 80%; left: 30%; animation-delay: 4s; }
  </style>
</head>
<body>
  <div class="square"></div>
  <div class="square"></div>
  <div class="square"></div>

  <h1>404</h1>
  <p>Oops! The page you're looking for doesn't exist.</p>
  <p class="highlight">Ceci n'est pas une page</p>
  <a href="/">← Back to Home</a>
</body>
</html>
